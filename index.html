<!doctype html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Lietuviško teksto kirčiavimas naršyklėje — vietinis režimas veikia visiškai jūsų įrenginyje."
    />
    <meta name="theme-color" content="#09706c" />

    <!-- Installable app (PWA) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kirčiuoklė" />

    <title>Kirčiuoklė</title>
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div class="hero-top">
          <h1 id="app-title">Kirčiuoklė</h1>
          <div class="language-switcher" id="language-switcher">
            <button type="button" data-lang="lt">LT</button>
            <button type="button" data-lang="en">EN</button>
            <button type="button" data-lang="ru">RU</button>
          </div>
        </div>
        <p id="hero-tagline"></p>
      </header>

      <section class="workspace" aria-labelledby="app-title">
        <form class="input-panel" id="accent-form">
          <div class="panel-head">
            <label class="field-label" for="source-text" id="input-label"></label>
          </div>
          <div class="textarea-wrap">
            <textarea
              id="source-text"
              name="text"
              maxlength="20000"
              rows="7"
              lang="lt"
              spellcheck="false"
              autocapitalize="off"
            ></textarea>
            <div
              class="textarea-overlay"
              id="source-overlay"
              aria-hidden="true"
            ></div>
          </div>
          <div class="input-legend" id="input-legend" hidden>
            <span><i class="legend-line legend-line--auto"></i><span id="legend-autofix"></span></span>
            <span><i class="legend-line legend-line--click"></i><span id="legend-clickfix"></span></span>
          </div>
          <div class="input-actions">
            <span class="counter" id="char-counter">0 / 20000</span>
            <div class="mode-controls" aria-label="Režimas">
              <span class="segmented-label" id="mode-label"></span>
              <button
                class="details-toggle"
                id="details-toggle"
                type="button"
                aria-expanded="true"
                aria-controls="panel-extras"
                hidden
              >
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M6 15l6-6 6 6" />
                </svg>
              </button>
              <span class="segmented-control" id="mode-switch">
                <button type="button" data-mode="web"></button>
                <button type="button" data-mode="local"></button>
              </span>
            </div>
            <span class="input-action-buttons">
              <button
                class="icon-button fix-all-button"
                id="fix-all-button"
                type="button"
                disabled
              >
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M4 7.5 L9.5 13 L20 2.5" />
                  <path class="fix-all-underline" d="M4 18.5 q2 2 4 0 t4 0 t4 0 t4 0" />
                </svg>
              </button>
              <button
                class="primary-button icon-button accent-icon-button"
                id="accent-button"
                type="submit"
              >
                <span class="accent-icon-glyph" lang="lt" aria-hidden="true">á</span>
              </button>
            </span>
          </div>
          <div class="panel-extras" id="panel-extras">
            <div class="panel-extras-inner">
              <p class="mode-explainer" id="mode-explainer"></p>
              <div class="local-tier-controls" id="local-tier-controls" hidden>
                <span class="segmented-label" id="local-tier-label"></span>
                <span class="segmented-control" id="local-tier-switch">
                  <button type="button" data-tier="light"></button>
                  <button type="button" data-tier="heavy"></button>
                </span>
              </div>
              <div class="local-status" id="local-status" role="status" aria-live="polite" hidden></div>
              <div class="local-update" id="local-update" hidden></div>
            </div>
          </div>
          <p class="message" id="form-message" role="status" aria-live="polite"></p>
        </form>

        <section class="result-panel" aria-labelledby="result-heading">
          <div class="result-toolbar panel-head">
            <h2 id="result-heading"></h2>
            <div class="result-actions">
              <div class="display-controls" aria-label="Rodymas">
                <span class="segmented-label" id="display-label"></span>
                <span class="segmented-control" id="display-switch">
                  <button type="button" data-display="top"></button>
                  <button type="button" data-display="all"></button>
                </span>
              </div>
              <button
                class="icon-button stats-button"
                id="local-stats-button"
                type="button"
                aria-haspopup="dialog"
                hidden
              >
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M3 12h4l2.5-7 5 14 2.5-7h4" />
                </svg>
              </button>
              <button class="secondary-button" id="copy-button" type="button" disabled></button>
            </div>
          </div>
          <div class="tagger-notice" id="tagger-notice" hidden>
            <span id="tagger-notice-text"></span>
            <button type="button" id="tagger-notice-close" aria-label="×">×</button>
          </div>
          <div class="result-output" id="result-output" lang="lt" aria-live="polite"></div>
          <div class="legend" id="legend">
            <span class="legend-heading" id="legend-label"></span>
            <span class="legend-items">
              <span><i class="legend-line legend-resolved"></i><span id="legend-resolved"></span></span>
              <span><i class="legend-line legend-ambiguous"></i><span id="legend-ambiguous"></span></span>
              <span><i class="legend-line legend-user"></i><span id="legend-user"></span></span>
              <span><i class="legend-line legend-unknown"></i><span id="legend-unknown"></span></span>
              <button
                class="primer-link"
                id="primer-link"
                type="button"
                aria-haspopup="dialog"
              ></button>
            </span>
          </div>
        </section>
      </section>
    </main>

    <div class="primer-backdrop" id="primer-backdrop" hidden>
      <div
        class="primer-dialog"
        id="primer-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="primer-title"
        tabindex="-1"
      >
        <button class="primer-close" id="primer-close" type="button" aria-label="×">×</button>
        <h2 id="primer-title"></h2>
        <p id="primer-intro"></p>
        <div class="primer-mark-list">
          <section class="primer-mark">
            <span class="primer-glyph" aria-hidden="true">à</span>
            <div>
              <h3 id="primer-grave-name"></h3>
              <p id="primer-grave-desc"></p>
              <p class="primer-examples"><span id="primer-grave-ex" lang="lt"></span></p>
            </div>
          </section>
          <section class="primer-mark">
            <span class="primer-glyph" aria-hidden="true">á</span>
            <div>
              <h3 id="primer-acute-name"></h3>
              <p id="primer-acute-desc"></p>
              <p class="primer-examples"><span id="primer-acute-ex" lang="lt"></span></p>
            </div>
          </section>
          <section class="primer-mark">
            <span class="primer-glyph" aria-hidden="true">ã</span>
            <div>
              <h3 id="primer-tilde-name"></h3>
              <p id="primer-tilde-desc"></p>
              <p class="primer-examples"><span id="primer-tilde-ex" lang="lt"></span></p>
            </div>
          </section>
        </div>
        <p class="primer-note" id="primer-mixed"></p>
        <p class="primer-note" id="primer-pair"></p>
        <a
          class="primer-more"
          id="primer-more"
          href="https://www.vlkk.lt/aktualiausios-temos/tartis-ir-kirciavimas"
          target="_blank"
          rel="noopener"
        ></a>
      </div>
    </div>

    <footer class="site-footer" id="site-footer"></footer>

    <script type="module" src="/src/client/main.ts"></script>
  </body>
</html>
