<!doctype html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content=""
    />
    <title>Kirčiuoklė</title>
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div class="hero-top">
          <h1 id="app-title">Kirčiuoklė</h1>
          <div class="language-switcher" id="language-switcher">
            <button type="button" data-lang="lt">LT</button>
            <button type="button" data-lang="en">EN</button>
            <button type="button" data-lang="ru">RU</button>
          </div>
        </div>
        <p id="hero-tagline"></p>
      </header>

      <section class="workspace" aria-labelledby="app-title">
        <form class="input-panel" id="accent-form">
          <div class="panel-head">
            <label class="field-label" for="source-text" id="input-label"></label>
          </div>
          <textarea
            id="source-text"
            name="text"
            maxlength="20000"
            rows="7"
            spellcheck="true"
          ></textarea>
          <div class="input-actions">
            <span class="counter" id="char-counter">0 / 20000</span>
            <button class="primary-button" id="accent-button" type="submit"></button>
          </div>
          <p class="message" id="form-message" role="status" aria-live="polite"></p>
        </form>

        <section class="result-panel" aria-labelledby="result-heading">
          <div class="result-toolbar panel-head">
            <h2 id="result-heading"></h2>
            <button class="secondary-button" id="copy-button" type="button" disabled></button>
          </div>
          <div class="tagger-notice" id="tagger-notice" hidden>
            <span id="tagger-notice-text"></span>
            <button type="button" id="tagger-notice-close" aria-label="×">×</button>
          </div>
          <div class="result-output" id="result-output" aria-live="polite"></div>
          <div class="legend" id="legend">
            <span class="legend-heading" id="legend-label"></span>
            <span class="legend-items">
              <span><i class="legend-line legend-resolved"></i><span id="legend-resolved"></span></span>
              <span><i class="legend-line legend-ambiguous"></i><span id="legend-ambiguous"></span></span>
              <span><i class="legend-line legend-user"></i><span id="legend-user"></span></span>
              <span><i class="legend-line legend-unknown"></i><span id="legend-unknown"></span></span>
            </span>
          </div>
        </section>
      </section>
    </main>

    <footer class="site-footer" id="site-footer"></footer>

    <script type="module" src="/src/client/main.ts"></script>
  </body>
</html>
